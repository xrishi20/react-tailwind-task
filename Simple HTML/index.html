<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/tailwind.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>Tailwind Practice</title>
  </head>
  <body class="antialiased bg-white font-nunito font-semibold">
    <main class="w-full min-h-screen flex justify-center items-center">
      <!-- Main Block -->
      <section
        class="max-w-6xl w-full flex-shrink-0 px-4 sm:px-8 py-12 grid sm:grid-cols-2 lg:grid-cols-7 gap-6"
      >
        <!-- Nav List 1 -->
        <article class="w-full lg:col-span-2">
          <h6 class="label">Studio</h6>
          <div class="space-y-1 flex flex-col items-start btnList">
            <button>Case Studies</button>
            <button>About Us</button>
            <button>Our Customers</button>
            <button>Contact</button>
          </div>
        </article>
        <!-- Nav List 2 -->
        <article class="w-full lg:col-span-2">
          <h6 class="label">Company</h6>
          <div class="space-y-1 flex flex-col items-start btnList">
            <button>Revenues</button>
            <button>Brand and Guides</button>
            <button>Press</button>
            <button>Legal</button>
          </div>
        </article>

        <!-- Blogs -->
        <article class="w-full sm:col-span-2 lg:col-span-3">
          <h6 class="label">From the Blog</h6>
          <div
            class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 md:pl-4"
          >
            <!-- Blog -->
            <button class="blog">
              <!-- Info -->
              <div>
                <h3>The signs of Spring</h3>
                <h6>by Josh Bean</h6>
              </div>
              <!-- Image -->
              <img src="./media/flowers.jpg" alt="flowers" />
            </button>

            <!-- Blog -->
            <button class="blog">
              <!-- Info -->
              <div>
                <h3>Avoid a Disappointing Vacation</h3>
                <h6>by Josh Bean</h6>
              </div>
              <!-- Image -->
              <img src="./media/tree.jpg" alt="tree" />
            </button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
